<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ היומן שלי ✨</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap');
  :root { --purple:#7c3aed; --pink:#ec4899; --blue:#3b82f6; --green:#10b981; --orange:#f59e0b; --red:#ef4444; --bg:#fef9ff; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Rubik',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

  .bg-shapes{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
  .bg-shapes span{position:absolute;display:block;border-radius:50%;opacity:.08;animation:floatShape 20s infinite ease-in-out;}
  .bg-shapes span:nth-child(1){width:200px;height:200px;background:var(--purple);top:10%;left:5%;}
  .bg-shapes span:nth-child(2){width:150px;height:150px;background:var(--pink);top:60%;right:10%;animation-delay:-5s;}
  .bg-shapes span:nth-child(3){width:180px;height:180px;background:var(--blue);bottom:10%;left:30%;animation-delay:-10s;}
  .bg-shapes span:nth-child(4){width:120px;height:120px;background:var(--green);top:30%;right:30%;animation-delay:-15s;}
  .bg-shapes span:nth-child(5){width:160px;height:160px;background:var(--orange);top:70%;left:60%;animation-delay:-8s;}
  @keyframes floatShape{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(30px,-30px) scale(1.1);}50%{transform:translate(-20px,20px) scale(.95);}75%{transform:translate(15px,15px) scale(1.05);}}

  .container{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:20px;}

  /* LOGIN */
  #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;}
  #loginScreen h1{font-size:2.8em;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
  #loginScreen .subtitle{font-size:1.2em;color:#888;margin-bottom:40px;}
  .avatars-grid{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:580px;}
  .avatar-btn{width:130px;padding:16px 8px;background:white;border:3px solid #e5e7eb;border-radius:24px;cursor:pointer;transition:all .3s ease;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .avatar-btn:hover{transform:translateY(-8px) scale(1.05);border-color:var(--purple);box-shadow:0 12px 30px rgba(124,58,237,.2);}
  .avatar-img{width:65px;height:65px;border-radius:50%;object-fit:cover;border:3px solid #e5e7eb;background:#f3f4f6;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .avatar-img img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .fallback-emoji{font-size:2.2em;line-height:1;}
  .avatar-btn .name{font-size:1.05em;font-weight:700;color:#333;}
  .avatar-btn .age-tag{font-size:.75em;color:#999;}
  .avatar-btn .has-lock{font-size:.75em;color:#bbb;}

  /* MODALS */
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:2000;display:none;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:white;border-radius:28px;padding:32px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .3s ease;}
  .modal-box h3{font-size:1.3em;margin-bottom:6px;color:#333;}
  .modal-box .modal-sub{color:#888;font-size:.95em;margin-bottom:20px;}
  .modal-box input[type="password"],.modal-box input[type="text"]{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:14px;font-family:'Rubik';font-size:1.1em;text-align:center;letter-spacing:4px;margin-bottom:14px;direction:ltr;}
  .modal-box input:focus{outline:none;border-color:var(--purple);}
  .modal-box .modal-error{color:var(--red);font-size:.9em;margin-bottom:10px;display:none;}
  .modal-box .modal-btns{display:flex;gap:10px;}
  .modal-box .modal-btns button{flex:1;padding:12px;border:none;border-radius:14px;font-family:'Rubik';font-size:1em;font-weight:600;cursor:pointer;transition:all .2s;}
  .btn-primary{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;}
  .btn-secondary{background:#f3f4f6;color:#666;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(124,58,237,.3);}

  /* APP */
  #appScreen{display:none;}
  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;margin-bottom:20px;background:white;border-radius:20px;box-shadow:0 4px 15px rgba(0,0,0,.06);flex-wrap:wrap;gap:10px;}
  .top-bar .user-info{display:flex;align-items:center;gap:10px;}
  .user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #e5e7eb;}
  .user-avatar-fallback{width:40px;height:40px;border-radius:50%;border:2px solid #e5e7eb;display:flex;align-items:center;justify-content:center;background:#f3f4f6;font-size:1.4em;}
  .top-bar .user-name{font-weight:700;font-size:1.15em;color:#333;}
  .points-badge{background:linear-gradient(135deg,var(--orange),#f97316);color:white;padding:8px 18px;border-radius:50px;font-weight:700;font-size:1em;display:flex;align-items:center;gap:6px;box-shadow:0 4px 12px rgba(245,158,11,.3);}
  .top-bar-actions{display:flex;gap:8px;align-items:center;}
  .icon-btn{background:#f3f4f6;border:none;border-radius:12px;padding:8px 14px;cursor:pointer;font-family:'Rubik';font-size:.85em;color:#666;transition:all .2s;}
  .icon-btn:hover{background:#e5e7eb;}

  /* SETTINGS */
  .settings-panel{background:white;border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 4px 15px rgba(0,0,0,.06);display:none;}
  .settings-panel.show{display:block;}
  .settings-panel h3{margin-bottom:16px;color:#333;}
  .settings-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
  .settings-row label{font-weight:600;color:#555;min-width:80px;}
  .settings-btn{padding:10px 18px;border:none;border-radius:12px;font-family:'Rubik';font-weight:600;cursor:pointer;transition:all .2s;background:var(--purple);color:white;font-size:.9em;}
  .settings-btn:hover{opacity:.9;}
  .settings-btn.danger{background:var(--red);}
  .photo-upload-area{width:80px;height:80px;border-radius:50%;border:3px dashed #d1d5db;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .3s;background:#f9fafb;position:relative;}
  .photo-upload-area:hover{border-color:var(--purple);background:#f3f0ff;}
  .photo-upload-area img{width:100%;height:100%;object-fit:cover;}
  .photo-upload-area .upload-text{font-size:.7em;color:#999;text-align:center;line-height:1.2;}
  .photo-upload-area input{display:none;}

  /* TABS */
  .tabs{display:flex;gap:10px;margin-bottom:20px;justify-content:center;}
  .tab-btn{padding:10px 24px;border:none;border-radius:50px;font-family:'Rubik';font-size:1em;font-weight:600;cursor:pointer;transition:all .3s;background:white;color:#666;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .tab-btn.active{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;box-shadow:0 4px 15px rgba(124,58,237,.3);}

  /* FORM */
  #formView,#historyView{display:none;}
  #formView.active,#historyView.active{display:block;}
  .question-card{background:white;border-radius:24px;padding:24px;margin-bottom:18px;box-shadow:0 4px 15px rgba(0,0,0,.05);border-right:5px solid var(--purple);transition:all .3s;position:relative;overflow:hidden;}
  .question-card:nth-child(2){border-right-color:var(--pink);}
  .question-card:nth-child(3){border-right-color:var(--green);}
  .question-card:nth-child(4){border-right-color:var(--blue);}
  .question-card .q-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .question-card .q-icon{font-size:1.8em;}
  .question-card .q-title{font-weight:700;font-size:1.05em;color:#333;}
  .question-card textarea{width:100%;border:2px solid #e5e7eb;border-radius:16px;padding:14px;font-family:'Rubik';font-size:1em;resize:vertical;min-height:80px;transition:border-color .3s;direction:rtl;}
  .question-card textarea:focus{outline:none;border-color:var(--purple);}
  .check-done{display:none;position:absolute;top:12px;left:12px;font-size:1.5em;animation:popIn .4s ease;}
  .question-card.answered .check-done{display:block;}
  .question-card.answered{opacity:.85;}
  @keyframes popIn{0%{transform:scale(0);}50%{transform:scale(1.3);}100%{transform:scale(1);}}

  /* TORAH */
  .torah-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:24px;padding:24px;margin-bottom:18px;box-shadow:0 4px 15px rgba(245,158,11,.15);border-right:5px solid var(--orange);}
  .torah-card .q-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .torah-card .q-icon{font-size:1.8em;}
  .torah-card .q-title{font-weight:700;font-size:1.1em;color:#92400e;}
  .torah-text{background:white;border-radius:16px;padding:18px;font-size:1.05em;line-height:1.8;color:#333;margin-bottom:14px;border:2px dashed #fbbf24;}
  .torah-source{font-size:.85em;color:#92400e;font-weight:600;margin-bottom:14px;text-align:left;}
  .torah-check-btn{display:flex;align-items:center;gap:10px;background:white;border:2px solid #fbbf24;border-radius:50px;padding:10px 20px;cursor:pointer;font-family:'Rubik';font-size:1em;font-weight:600;color:#92400e;transition:all .3s;}
  .torah-check-btn:hover{background:#fef3c7;}
  .torah-check-btn.checked{background:#10b981;border-color:#10b981;color:white;}
  .torah-check-btn .checkbox{width:24px;height:24px;border:2px solid #fbbf24;border-radius:8px;display:flex;align-items:center;justify-content:center;background:white;transition:all .3s;}
  .torah-check-btn.checked .checkbox{background:white;border-color:white;}

  /* SUBMIT */
  .submit-btn{display:block;width:100%;padding:18px;background:linear-gradient(135deg,var(--purple),var(--pink));color:white;border:none;border-radius:20px;font-family:'Rubik';font-size:1.3em;font-weight:700;cursor:pointer;transition:all .3s;box-shadow:0 6px 20px rgba(124,58,237,.3);margin-top:10px;}
  .submit-btn:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(124,58,237,.4);}
  .submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  /* POPUP */
  .points-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:white;border-radius:30px;padding:40px;text-align:center;z-index:1000;box-shadow:0 20px 60px rgba(0,0,0,.2);transition:transform .4s cubic-bezier(.175,.885,.32,1.275);}
  .points-popup.show{transform:translate(-50%,-50%) scale(1);}
  .points-popup .big-emoji{font-size:4em;margin-bottom:10px;}
  .points-popup .big-text{font-size:2em;font-weight:800;background:linear-gradient(135deg,var(--orange),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .points-popup .sub-text{font-size:1.1em;color:#666;margin-top:8px;}
  .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:999;display:none;opacity:0;transition:opacity .3s;}
  .overlay.show{display:block;opacity:1;}
  .confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1001;overflow:hidden;}
  .confetti-piece{position:absolute;width:12px;height:12px;top:-20px;animation:confettiFall 3s ease-in forwards;}
  @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

  /* HISTORY */
  .history-entry{background:white;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.05);border-right:4px solid var(--purple);}
  .history-date{font-weight:700;font-size:1.1em;color:var(--purple);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
  .history-date-hebrew{font-size:.9em;color:#999;font-weight:500;margin-bottom:12px;}
  .history-item{margin-bottom:10px;}
  .history-item .label{font-weight:600;color:#666;font-size:.9em;margin-bottom:3px;}
  .history-item .value{color:#333;font-size:1em;line-height:1.5;}
  .history-points{display:inline-block;background:linear-gradient(135deg,var(--orange),#f97316);color:white;padding:4px 14px;border-radius:50px;font-weight:700;font-size:.85em;margin-top:8px;}
  .no-history{text-align:center;padding:60px 20px;color:#999;font-size:1.1em;}
  .no-history .big{font-size:3em;margin-bottom:10px;}

  .streak-bar{background:linear-gradient(135deg,#dbeafe,#ede9fe);border-radius:16px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;color:var(--purple);}
  .streak-bar .fire{font-size:1.4em;}
  .date-display{text-align:center;margin-bottom:4px;font-size:1.05em;color:#888;font-weight:500;}
  .date-display-hebrew{text-align:center;margin-bottom:16px;font-size:1.05em;color:var(--purple);font-weight:600;}
  .progress-bar-container{background:#e5e7eb;border-radius:50px;height:12px;margin-bottom:20px;overflow:hidden;}
  .progress-bar-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--purple),var(--pink),var(--orange));transition:width .5s ease;width:0%;}
  .mini-points{position:fixed;z-index:100;font-size:1.4em;font-weight:800;color:var(--orange);pointer-events:none;animation:floatUp 1.5s ease-out forwards;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-80px) scale(1.3);}}
  .already-done{text-align:center;padding:40px 20px;background:white;border-radius:24px;box-shadow:0 4px 15px rgba(0,0,0,.05);}
  .already-done .big{font-size:4em;margin-bottom:10px;}
  .already-done h2{color:var(--green);margin-bottom:8px;}
  .already-done p{color:#666;}

  @media(max-width:500px){
    #loginScreen h1{font-size:2em;}
    .avatar-btn{width:100px;padding:12px 6px;}
    .avatar-img{width:50px;height:50px;}
    .fallback-emoji{font-size:1.8em;}
  }
</style>
</head>
<body>
<div class="bg-shapes"><span></span><span></span><span></span><span></span><span></span></div>
<div class="overlay" id="overlay"></div>
<div class="points-popup" id="pointsPopup">
  <div class="big-emoji">🎉</div>
  <div class="big-text" id="popupText"></div>
  <div class="sub-text" id="popupSub"></div>
</div>
<div class="confetti-container" id="confetti"></div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="passwordModal">
  <div class="modal-box">
    <h3 id="modalTitle"></h3>
    <div class="modal-sub" id="modalSub"></div>
    <input type="password" id="modalInput" placeholder="הקלד/י סיסמה..." maxlength="20">
    <div class="modal-error" id="modalError">סיסמה שגויה, נסו שוב!</div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="modalConfirm()">כניסה 🚀</button>
      <button class="btn-secondary" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>
<!-- SET PASSWORD MODAL -->
<div class="modal-overlay" id="setPasswordModal">
  <div class="modal-box">
    <h3>🔐 הגדרת סיסמה</h3>
    <div class="modal-sub" id="setPwSub"></div>
    <input type="password" id="setPwInput1" placeholder="בחר/י סיסמה..." maxlength="20">
    <input type="password" id="setPwInput2" placeholder="הקלד/י שוב לאישור..." maxlength="20">
    <div class="modal-error" id="setPwError"></div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="confirmSetPassword()">שמור 💾</button>
      <button class="btn-secondary" onclick="closeSetPasswordModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="loginScreen">
    <h1>✨ היומן שלי ✨</h1>
    <div class="subtitle">התבוננות והעצמה אישית לכל יום</div>
    <div class="avatars-grid" id="avatarsGrid"></div>
  </div>

  <div id="appScreen">
    <div class="top-bar">
      <div class="user-info">
        <span id="topBarAvatar"></span>
        <span class="user-name" id="userName"></span>
      </div>
      <div class="points-badge">⭐ <span id="totalPoints">0</span> נקודות</div>
      <div class="top-bar-actions">
        <button class="icon-btn" onclick="toggleSettings()">⚙️ הגדרות</button>
        <button class="icon-btn" onclick="logout()">🔙 חזור</button>
      </div>
    </div>
    <div class="settings-panel" id="settingsPanel">
      <h3>⚙️ הגדרות</h3>
      <div class="settings-row">
        <label>תמונה:</label>
        <div class="photo-upload-area" id="photoUploadArea" onclick="document.getElementById('photoInput').click()">
          <span class="upload-text" id="photoPlaceholder">📷<br>העלאה</span>
          <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoUpload(event)">
        </div>
      </div>
      <div class="settings-row">
        <label>סיסמה:</label>
        <button class="settings-btn" onclick="openSetPassword()" id="pwSettingsBtn">הגדר סיסמה 🔐</button>
        <button class="settings-btn danger" onclick="removePassword()" id="pwRemoveBtn" style="display:none">הסר סיסמה 🗑️</button>
      </div>
    </div>
    <div class="streak-bar" id="streakBar" style="display:none"><span class="fire">🔥</span><span id="streakText"></span></div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('form')">📝 היום שלי</button>
      <button class="tab-btn" onclick="switchTab('history')">📅 ההיסטוריה שלי</button>
    </div>
    <div id="formView" class="active">
      <div class="date-display" id="dateDisplay"></div>
      <div class="date-display-hebrew" id="hebrewDateDisplay"></div>
      <div class="progress-bar-container"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div id="formContent"></div>
    </div>
    <div id="historyView"><div id="historyContent"></div></div>
  </div>
</div>

<script>
// =============================================
// HEBREW DATE
// =============================================
const HebDate=(()=>{
  const MONTHS=['תשרי','חשון','כסלו','טבת','שבט','אדר','ניסן','אייר','סיון','תמוז','אב','אלול'];
  const MONTHS_LEAP=['תשרי','חשון','כסלו','טבת','שבט','אדר א׳','אדר ב׳','ניסן','אייר','סיון','תמוז','אב','אלול'];
  const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const G_ONES=['','א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ז׳','ח׳','ט׳'];
  const G_TENS=['','י׳','כ׳','ל׳'];
  function hnum(n){
    if(n===15)return'ט״ו';if(n===16)return'ט״ז';if(n<=0)return'';
    const t=Math.floor(n/10),o=n%10;
    let ts=t>0?G_TENS[t].replace('׳',''):'',os=o>0?G_ONES[o].replace('׳',''):'';
    if(ts&&os)return ts+'״'+os;if(ts)return ts+'׳';if(os)return os+'׳';return'';
  }
  function hyear(y){
    const h=Math.floor((y%1000)/100),t=Math.floor((y%100)/10),o=y%10;
    const hs=['','ק','ר','ש','ת','תק','תר','תש','תת','תתק'];
    const ts=['','י','כ','ל','מ','נ','ס','ע','פ','צ'];
    const os=['','א','ב','ג','ד','ה','ו','ז','ח','ט'];
    let s='ה׳'+hs[h]+ts[t];
    if(t>0&&o>0)s+='״'+os[o];else if(o>0)s+=os[o]+'׳';else if(t>0)s+='׳';
    return s;
  }
  function isLeap(y){return((7*y+1)%19)<7;}
  function monthsIn(y){return isLeap(y)?13:12;}
  function elapsed(y){
    const m=Math.floor((235*Math.floor((y-1)/19))+(12*((y-1)%19))+(7*((y-1)%19)+1)/19);
    const p=204+793*(m%1080);
    const h=5+12*m+793*Math.floor(m/1080)+Math.floor(p/1080);
    const parts=(p%1080)+1080*(h%24);
    const day=1+29*m+Math.floor(h/24);
    let ad;
    if(parts>=19440||(day%7===2&&parts>=9924&&!isLeap(y))||(day%7===1&&parts>=16789&&isLeap(y-1)))ad=day+1;else ad=day;
    if(ad%7===0||ad%7===3||ad%7===5)return ad+1;return ad;
  }
  function daysInY(y){return elapsed(y+1)-elapsed(y);}
  function daysInM(m,y){
    if(m===2||m===4||m===6||m===10||m===13)return 29;
    if(m===12)return isLeap(y)?30:29;
    if(m===8){return daysInY(y)%10===5?30:29;}
    if(m===9){return daysInY(y)%10===3?29:30;}
    return 30;
  }
  function toHeb(gY,gM,gD){
    const a=Math.floor((14-gM)/12),y=gY+4800-a,mo=gM+12*a-3;
    const jd=gD+Math.floor((153*mo+2)/5)+365*y+Math.floor(y/4)-Math.floor(y/100)+Math.floor(y/400)-32045;
    const abs=jd-347996;
    let hY=Math.floor((abs+347997)*19/6939.7)+1;
    while(elapsed(hY)>abs)hY--;while(elapsed(hY+1)<=abs)hY++;
    let hM=1,diy=abs-elapsed(hY)+1;
    while(diy>daysInM(hM,hY)){diy-=daysInM(hM,hY);hM++;if(hM>monthsIn(hY))break;}
    const mn=(isLeap(hY)?MONTHS_LEAP:MONTHS)[hM-1]||'';
    return{day:diy,month:hM,year:hY,monthName:mn,dayStr:hnum(diy),yearStr:hyear(hY)};
  }
  function format(d){
    d=d||new Date();const dow=DAYS[d.getDay()];
    const h=toHeb(d.getFullYear(),d.getMonth()+1,d.getDate());
    return`יום ${dow}, ${h.dayStr} ${h.monthName} ${h.yearStr}`;
  }
  function formatShort(ds){const d=new Date(ds);const h=toHeb(d.getFullYear(),d.getMonth()+1,d.getDate());return`${h.dayStr} ${h.monthName}`;}
  return{format,formatShort};

// Get today's question for a specific user and category
function genderize(q, gender) {
  if (gender !== 'f') return q;
  return q
    .replace(/אתה מודה/g, 'את מודה')
    .replace(/אתה לוקח/g, 'את לוקחת')
    .replace(/אתה רוצה/g, 'את רוצה')
    .replace(/אתה יודע/g, 'את יודעת')
    .replace(/אתה מרגיש/g, 'את מרגישה')
    .replace(/אתה עושה/g, 'את עושה')
    .replace(/אתה חושב/g, 'את חושבת')
    .replace(/אתה יכול/g, 'את יכולה')
    .replace(/אתה אוהב/g, 'את אוהבת')
    .replace(/אתה לומד/g, 'את לומדת')
    .replace(/אתה צריך/g, 'את צריכה')
    .replace(/אתה רואה/g, 'את רואה')
    .replace(/אתה שומע/g, 'את שומעת')
    .replace(/אתה נותן/g, 'את נותנת')
    .replace(/אתה מקבל/g, 'את מקבלת')
    .replace(/אתה שמח /g, 'את שמחה ')
    .replace(/אתה גאה/g, 'את גאה')
    .replace(/אתה גדל/g, 'את גדלה')
    .replace(/שאתה /g, 'שאת ')
    .replace(/אותך/g, 'אותך');
}

function getTodayQuestion(userId, categoryId) {
  const user = USERS.find(u => u.id === userId);
  // Fixed question for grateful category
  const cat = CATEGORIES.find(c => c.id === categoryId);
  if (cat && cat.fixed) {
    return genderize(cat.fixed, user ? user.gender : 'm');
  }
  if (!user) return '';
  const pool = Q_BANK[user.tier][categoryId];
  // Use day-of-year + user-specific offset for variety
  const doy = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  const userOffset = userId.split('').reduce((s,c) => s + c.charCodeAt(0), 0);
  const idx = (doy + userOffset) % pool.length;
  return genderize(pool[idx], user.gender);
}

function todayStr(){return new Date().toISOString().split('T')[0]}
function gregDate(){
  const d=new Date(),dw=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const mo=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return`יום ${dw[d.getDay()]}, ${d.getDate()} ${mo[d.getMonth()]} ${d.getFullYear()}`;
}
function todayTorah(){
  const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);
  return TORAH_PASSAGES[doy%TORAH_PASSAGES.length];
}
function getStreak(uid){
  const ud=getUserData(uid);if(!ud.entries.length)return 0;
  let s=0,ck=new Date();ck.setHours(0,0,0,0);
  if(!ud.entries.some(e=>e.date===todayStr()))ck.setDate(ck.getDate()-1);
  while(true){const ds=ck.toISOString().split('T')[0];if(ud.entries.some(e=>e.date===ds)){s++;ck.setDate(ck.getDate()-1)}else break;}
  return s;
}

function handlePhotoUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{
    const img=new Image();img.onload=()=>{
      const c=document.createElement('canvas'),MX=200;
      let w=img.width,h=img.height;
      if(w>h){h=(h/w)*MX;w=MX;}else{w=(w/h)*MX;h=MX;}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      const d=c.toDataURL('image/jpeg',.8);
      const m=getMeta(currentUser.id);m.photo=d;saveMeta(currentUser.id,m);
      updatePhotoUI();updateTopAvatar();renderLogin();
    };img.src=ev.target.result;
  };r.readAsDataURL(f);
}
function updatePhotoUI(){
  const a=document.getElementById('photoUploadArea'),ph=getPhoto(currentUser.id),pl=document.getElementById('photoPlaceholder');
  if(ph){let i=a.querySelector('img');if(!i){i=document.createElement('img');a.appendChild(i);}i.src=ph;pl.style.display='none';}
  else{const i=a.querySelector('img');if(i)i.remove();pl.style.display='';}
}

}

  }).join('');
  html+=`<div class="torah-card">
    <div class="q-header"><span class="q-icon">📖</span><span class="q-title">פסקה יפה של לימוד תורה</span></div>
    <div class="torah-text">${torah.text}</div>
    <div class="torah-source">${torah.source}</div>
    <button class="torah-check-btn" id="torahBtn" onclick="toggleTorah()"><span class="checkbox" id="torahCB"></span> קראתי! ✓</button>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitDay()" disabled>🎉 סיימתי!</button>`;
  fc.innerHTML=html;updateProgress();
}
function onAnswer(qId,el){
  const c=document.getElementById('card-'+qId);
  if(el.value.trim().length>2&&!answeredQ.has(qId)){answeredQ.add(qId);c.classList.add('answered');showMini(el,20);}
  else if(el.value.trim().length<=2&&answeredQ.has(qId)){answeredQ.delete(qId);c.classList.remove('answered');}
  updateProgress();
}
function toggleTorah(){
  torahRead=!torahRead;
  const b=document.getElementById('torahBtn'),cb=document.getElementById('torahCB');
  if(torahRead){b.classList.add('checked');cb.innerHTML='✓';showMini(b,20);}
  else{b.classList.remove('checked');cb.innerHTML='';}
  updateProgress();
}
function updateProgress(){
  const t=CATEGORIES.length+1,d=answeredQ.size+(torahRead?1:0);
  document.getElementById('progressBar').style.width=Math.round(d/t*100)+'%';
  const b=document.getElementById('submitBtn');if(b)b.disabled=d===0;
}
function showMini(el,pts){
  const p=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  const r=el.getBoundingClientRect(),d=document.createElement('div');
  d.className='mini-points';d.textContent=`${p.emoji} ${p.text} +${pts}`;
  d.style.left=r.left+r.width/2-50+'px';d.style.top=r.top-10+'px';
  document.body.appendChild(d);setTimeout(()=>d.remove(),1500);
}
function submitDay(){
  if(answeredQ.size===0&&!torahRead)return;
  const entry={date:todayStr(),hebrewDate:HebDate.format(new Date()),answers:{},questions:{},torahRead,pointsEarned:0};
  CATEGORIES.forEach(cat=>{
    const v=document.getElementById('input-'+cat.id).value.trim();
    entry.questions[cat.id]=getTodayQuestion(currentUser.id,cat.id);
    if(v){entry.answers[cat.id]=v;entry.pointsEarned+=20;}
  });
  if(torahRead)entry.pointsEarned+=20;
  if(answeredQ.size===CATEGORIES.length&&torahRead)entry.pointsEarned+=20;

  const data=getData();
  if(!data[currentUser.id])data[currentUser.id]={entries:[],totalPoints:0};
  data[currentUser.id].entries.push(entry);
  data[currentUser.id].totalPoints+=entry.pointsEarned;
  saveData(data);
  document.getElementById('totalPoints').textContent=data[currentUser.id].totalPoints;

  const fm=FINALS[Math.floor(Math.random()*FINALS.length)];
  const allDone=answeredQ.size===CATEGORIES.length&&torahRead;
  document.getElementById('popupText').textContent=`+${entry.pointsEarned} נקודות!`;
  document.getElementById('popupSub').textContent=allDone?`🌟 בונוס השלמה! ${fm}`:fm;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('pointsPopup').classList.add('show');
  launchConfetti();
  setTimeout(()=>{
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('pointsPopup').classList.remove('show');
    renderForm();renderHistory();
    const st=getStreak(currentUser.id);
    if(st>1){document.getElementById('streakBar').style.display='flex';document.getElementById('streakText').textContent=`רצף של ${st} ימים!`;}
  },3500);
}
function launchConfetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const cols=['#7c3aed','#ec4899','#3b82f6','#10b981','#f59e0b','#ef4444','#fbbf24','#8b5cf6'];
  for(let i=0;i<60;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=cols[Math.floor(Math.random()*cols.length)];p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.width=(8+Math.random()*10)+'px';p.style.height=(8+Math.random()*10)+'px';p.style.animationDelay=Math.random()*1.5+'s';p.style.animationDuration=(2+Math.random()*2)+'s';c.appendChild(p);}
  setTimeout(()=>c.innerHTML='',5000);
}

// =============================================
// HISTORY
// =============================================
function renderHistory(){
  const ud=getUserData(currentUser.id),ct=document.getElementById('historyContent');
  if(!ud.entries.length){ct.innerHTML='<div class="no-history"><div class="big">📝</div><div>עדיין אין רשומות – בואו נתחיל!</div></div>';return;}
  ct.innerHTML=[...ud.entries].reverse().map(entry=>{
    const d=new Date(entry.date),dw=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
    const ds=`יום ${dw[d.getDay()]}, ${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
    const hd=entry.hebrewDate||HebDate.formatShort(entry.date);
    let items=CATEGORIES.map(cat=>{
      if(!entry.answers[cat.id])return'';
      const qText=entry.questions&&entry.questions[cat.id]?entry.questions[cat.id]:cat.label;
      return`<div class="history-item"><div class="label">${cat.icon} ${qText}</div><div class="value">${entry.answers[cat.id]}</div></div>`;
    }).join('');
    if(entry.torahRead)items+=`<div class="history-item"><div class="label">📖 קראתי פסקת תורה</div><div class="value">✅</div></div>`;
    return`<div class="history-entry"><div class="history-date">📅 ${ds}</div><div class="history-date-hebrew">🕎 ${hd}</div>${items}<div class="history-points">⭐ ${entry.pointsEarned} נקודות</div></div>`;
  }).join('');
}

// =============================================
// TABS
// =============================================
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(tab==='form'&&i===0)||(tab==='history'&&i===1)));
  document.getElementById('formView').classList.toggle('active',tab==='form');
  document.getElementById('historyView').classList.toggle('active',tab==='history');
}

// =============================================
// INIT
// =============================================
(function init(){
  const hash=window.location.hash.replace('#','');
  const user=hash&&USERS.find(u=>u.id===hash);
  if(user){attemptLogin(user.id);}
  else{renderLogin();}
})();
window.addEventListener('hashchange',function(){
  const hash=window.location.hash.replace('#','');
  const user=hash&&USERS.find(u=>u.id===hash);
  if(user&&(!currentUser||currentUser.id!==user.id)){attemptLogin(user.id);}
  else if(!hash&&currentUser){logout();}
});
</script>

</html>
